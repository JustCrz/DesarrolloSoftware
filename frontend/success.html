<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container { text-align: center; padding: 50px; margin-top: 50px; }
        .success-icon { font-size: 80px; color: #28a745; }
        .btn-home { background-color: #ff69b4; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card success-container">
        <div class="success-icon">✔</div>
        <h1>¡Gracias por tu compra!</h1>
        <p>Tu pago ha sido procesado correctamente por Stripe.</p>
        <br>
        <a href="index.html" class="btn-home">Volver a la tienda</a>
    </div>
    <script>
    // Limpia el carrito en el cliente si usas localStorage
    localStorage.removeItem('carrito'); 
    // Si el carrito es solo una variable global en script.js, 
    // se reiniciará al volver al index.html.
</script>
</body>
</html>
